<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Equity Scenarios — RITA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── RITA FnO — dark design tokens ───────────────────────────────────── */
    :root {
      --bg:         #0d0f14;
      --surface:    #161920;
      --surface2:   #1e2230;
      --border:     #2a2e3d;
      --border2:    #363b4f;
      --text:       #e8eaf0;
      --t2:         #9ba3b8;
      --t3:         #6b7494;
      --t4:         #4a5168;
      --build:      #4fc3f7;
      --build-bg:   rgba(79,195,247,0.08);
      --build-bd:   rgba(79,195,247,0.25);
      --run:        #66bb6a;
      --run-bg:     rgba(102,187,106,0.08);
      --run-bd:     rgba(102,187,106,0.25);
      --warn:       #ffa726;
      --warn-bg:    rgba(255,167,38,0.08);
      --warn-bd:    rgba(255,167,38,0.25);
      --danger:     #ef5350;
      --danger-bg:  rgba(239,83,80,0.08);
      --danger-bd:  rgba(239,83,80,0.25);
      --ds:         #26c6da;
      --ds-bg:      rgba(38,198,218,0.08);
      --ds-bd:      rgba(38,198,218,0.25);
      --fd:         'Epilogue', system-ui, sans-serif;
      --fm:         'IBM Plex Mono', monospace;
      --r:          6px;
      --sh:         0 2px 8px rgba(0,0,0,0.35);
      --shm:        0 4px 18px rgba(0,0,0,0.5);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--fd);
      font-size: 14px;
      line-height: 1.5;
      min-height: 100vh;
    }

    /* ── Topbar — matches fno.html pattern ──────────────────────────────── */
    .topbar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1.5px solid var(--border);
      height: 54px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 200;
      box-shadow: var(--sh);
    }
    .topbar-left  { display: flex; align-items: center; gap: 10px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
    .topbar-back {
      display: flex; align-items: center; justify-content: center;
      width: 28px; height: 28px;
      color: var(--t2); font-size: 16px;
      text-decoration: none; border-radius: var(--r);
      transition: background 0.15s, color 0.15s;
    }
    .topbar-back:hover { background: var(--surface2); color: var(--text); }
    .topbar-divider { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }
    .app-badge {
      font-family: var(--fm);
      font-size: 10px;
      font-weight: 500;
      padding: 2px 9px;
      border-radius: 4px;
      background: var(--run-bg);
      color: var(--run);
      border: 1px solid var(--run-bd);
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .topbar-titles { display: flex; flex-direction: column; line-height: 1.3; }
    .topbar-title  { font-size: 13px; font-weight: 600; color: var(--text); }
    .topbar-sub    { font-size: 11px; color: var(--t3); }
    .topbar-updated { font-size: 11px; color: var(--t4); font-family: var(--fm); }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.ok  { background: var(--run);    animation: pulse 2.5s infinite; }
    .status-dot.err { background: var(--danger); }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.35; }
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .page { max-width: 1160px; margin: 0 auto; padding: 24px 24px 60px; }

    /* ── Section header — matches fno card-hdr convention ───────────────── */
    .page-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px;
    }
    .page-hdr-title {
      font-family: var(--fm);
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--t3);
    }
    .page-hdr-sub { font-size: 11px; color: var(--t4); font-family: var(--fm); }

    /* ── KPI strip — matches fno .kpi convention ────────────────────────── */
    .kpi-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }
    .kpi-tile {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 14px 16px;
      box-shadow: var(--sh);
    }
    .kpi-label {
      font-family: var(--fm);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--t3);
      margin-bottom: 5px;
    }
    .kpi-val {
      font-family: var(--fm);
      font-size: 20px;
      font-weight: 500;
      line-height: 1.2;
      color: var(--text);
    }
    .kpi-sub   { font-size: 11px; color: var(--t3); margin-top: 3px; }
    .kpi-val.pos  { color: var(--run); }
    .kpi-val.neg  { color: var(--danger); }
    .kpi-val.warn-col { color: var(--warn); }
    .kpi-sub.pos  { color: var(--run); }
    .kpi-sub.neg  { color: var(--danger); }

    /* ── Alert strip ────────────────────────────────────────────────────── */
    .alert-strip {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 10px 16px;
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      box-shadow: var(--sh);
    }
    .strip-spacer { flex: 1; }
    .strip-info   { font-size: 11px; color: var(--t4); font-family: var(--fm); }

    /* ── Badges — fno naming: .badge.ok / .badge.warn / .badge.err ──────── */
    .badge {
      display: inline-block;
      padding: 2px 9px;
      border-radius: 3px;
      font-size: 10px; font-weight: 700;
      font-family: var(--fm);
      text-transform: uppercase;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    .badge-err  { background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger-bd); }
    .badge-warn { background: var(--warn-bg);   color: var(--warn);   border: 1px solid var(--warn-bd);   }
    .badge-ok   { background: var(--run-bg);    color: var(--run);    border: 1px solid var(--run-bd);    }
    .badge-neu  { background: var(--surface2);  color: var(--t3);     border: 1px solid var(--border2);   }
    .badge-ds   { background: var(--ds-bg);     color: var(--ds);     border: 1px solid var(--ds-bd);     }

    /* ── Scenarios grid ─────────────────────────────────────────────────── */
    .scenarios-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }

    @media (max-width: 860px) {
      .scenarios-grid { grid-template-columns: 1fr; }
      .kpi-strip      { grid-template-columns: 1fr 1fr; }
    }

    /* ── Instrument card — fno card pattern with left-border urgency ─────── */
    .sc-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-left: 4px solid var(--border2);  /* urgency stripe */
      border-radius: var(--r);
      box-shadow: var(--sh);
      overflow: hidden;
      transition: box-shadow 0.15s;
    }
    .sc-card:hover { box-shadow: var(--shm); }

    .card-border-danger { border-left-color: var(--danger); }
    .card-border-warn   { border-left-color: var(--warn); }
    .card-border-ok     { border-left-color: var(--run); }
    .card-border-neu    { border-left-color: var(--border2); }

    /* Card header section */
    .sc-hdr {
      display: flex; justify-content: space-between; align-items: flex-start;
      padding: 16px 18px 0;
      margin-bottom: 14px; gap: 12px;
    }
    .sc-symbol {
      font-size: 15px; font-weight: 700; letter-spacing: -0.2px;
      font-family: var(--fm);
      display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    }
    .sc-name { font-size: 12px; color: var(--t3); margin-top: 3px; }
    .sc-meta { font-size: 11px; color: var(--t4); margin-top: 2px; font-family: var(--fm); }
    .sc-hdr-right { text-align: right; flex-shrink: 0; }
    .day-chg {
      font-size: 12px; font-weight: 600; margin-top: 6px; font-family: var(--fm);
    }
    .day-chg.pos { color: var(--run); }
    .day-chg.neg { color: var(--danger); }
    .day-chg.neu { color: var(--t3); }

    /* Trailing stop pill */
    .trailing-pill {
      font-size: 9px; text-transform: uppercase; letter-spacing: .05em;
      color: var(--ds); background: var(--ds-bg); border: 1px solid var(--ds-bd);
      border-radius: 3px; padding: 1px 6px; font-weight: 600; font-family: var(--fm);
    }

    /* P&L metrics row */
    .sc-pnl-row {
      display: flex; gap: 0;
      margin: 0 18px 14px;
      padding-bottom: 14px;
      border-bottom: 1px solid var(--border);
    }
    .sc-pnl-item {
      flex: 1; padding: 0 8px;
      border-right: 1px solid var(--border);
    }
    .sc-pnl-item:first-child { padding-left: 0; }
    .sc-pnl-item:last-child  { border-right: none; padding-right: 0; }
    .pnl-label {
      font-size: 9px; text-transform: uppercase;
      color: var(--t4); letter-spacing: .06em;
      margin-bottom: 4px; font-family: var(--fm);
    }
    .pnl-val {
      font-size: 13px; font-weight: 500;
      color: var(--text); font-family: var(--fm);
    }
    .pnl-val.pos { color: var(--run); }
    .pnl-val.neg { color: var(--danger); }

    /* ── Range bar ───────────────────────────────────────────────────────── */
    .range-section { margin: 0 18px 12px; }

    .bar-legend {
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--fm); margin-bottom: 8px;
    }
    .bar-leg-left  { font-size: 10px; font-weight: 600; color: var(--danger); }
    .bar-leg-mid   {
      font-size: 10px; color: var(--t4); font-weight: 400;
      background: var(--surface2); padding: 1px 7px;
      border-radius: 3px; border: 1px solid var(--border);
    }
    .bar-leg-right { font-size: 10px; font-weight: 600; color: var(--run); }

    /* track */
    .bar-wrap { position: relative; height: 30px; margin-bottom: 8px; }
    .bar-track {
      position: absolute; top: 50%; left: 0; right: 0;
      transform: translateY(-50%);
      height: 8px; background: var(--surface2);
      border-radius: 4px; border: 1px solid var(--border);
      overflow: hidden;
    }
    .bar-fill {
      position: absolute; top: 0; left: 0; bottom: 0;
      border-radius: 4px; transition: width 0.5s ease;
    }
    /* colour zones for the fill — set by JS via inline style */

    /* current-price dot */
    .bar-dot {
      position: absolute; top: 50%;
      transform: translate(-50%, -50%);
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid var(--surface);
      box-shadow: 0 0 0 1px rgba(0,0,0,0.4);
      z-index: 2; transition: left 0.5s ease;
    }
    /* average cost dot */
    .bar-avg-dot {
      position: absolute; top: 50%;
      transform: translate(-50%, -50%);
      width: 8px; height: 8px;
      border-radius: 50%; background: var(--t4);
      border: 1px solid var(--surface); z-index: 1;
    }
    /* ltp label below dot */
    .bar-ltp-label {
      position: absolute; bottom: 0;
      transform: translateX(-50%);
      font-size: 10px; font-weight: 700;
      font-family: var(--fm); white-space: nowrap; color: var(--text);
    }
    .bar-stat {
      display: flex; justify-content: space-between;
      font-size: 11px; color: var(--t3); font-family: var(--fm);
      margin-top: 2px;
    }
    .bar-stat-avg { font-size: 10px; color: var(--t4); margin-top: 3px; font-family: var(--fm); }
    .trailing-note { font-size: 10px; color: var(--ds); margin-top: 4px; font-family: var(--fm); }

    /* ── Trade chips ─────────────────────────────────────────────────────── */
    .trade-row { display: flex; flex-wrap: wrap; gap: 6px; margin: 0 18px 12px; }
    .trade-chip {
      font-size: 11px; color: var(--t3);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 8px;
      font-family: var(--fm);
    }
    .trade-chip strong { color: var(--t2); font-weight: 500; }

    /* ── Recommendation — flush card footer ─────────────────────────────── */
    .rec {
      padding: 10px 18px;
      font-size: 12px; line-height: 1.5;
      border-top: 1px solid var(--border);
      border-left: 3px solid transparent;
      margin-top: 2px;
    }
    .rec-urgent {
      background: rgba(239,83,80,0.06);
      border-left-color: var(--danger);
      color: var(--danger);
    }
    .rec-watch {
      background: rgba(255,167,38,0.06);
      border-left-color: var(--warn);
      color: var(--warn);
    }
    .rec-good {
      background: rgba(102,187,106,0.06);
      border-left-color: var(--run);
      color: var(--run);
    }
    .rec-info {
      background: var(--build-bg);
      border-left-color: var(--build);
      color: var(--t2);
    }

    /* ── Historical alerts ──────────────────────────────────────────────── */
    .section-block { margin-top: 36px; }
    .section-title {
      font-family: var(--fm);
      font-size: 10px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .08em;
      color: var(--t4);
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 14px;
    }
    .triggered-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .triggered-chip {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--r);
      padding: 6px 12px;
      font-size: 12px; color: var(--t3);
      display: flex; gap: 8px; align-items: center;
      font-family: var(--fm);
    }
    .triggered-chip strong { color: var(--text); font-weight: 600; }
    .tc-price { font-family: var(--fm); font-size: 11px; color: var(--t4); }

    /* ── States ─────────────────────────────────────────────────────────── */
    .loading {
      padding: 60px; text-align: center; color: var(--t3); grid-column: 1 / -1;
    }
    .load-err {
      padding: 24px; color: var(--danger);
      background: var(--danger-bg);
      border: 1.5px solid var(--danger-bd);
      border-radius: var(--r);
      grid-column: 1 / -1;
      font-family: var(--fm); font-size: 12px;
    }
  </style>
</head>
<body>

  <!-- ── Topbar — fno.html pattern ─────────────────────────────────────── -->
  <div class="topbar">
    <div class="topbar-left">
      <a class="topbar-back" href="fno.html" title="Back to FnO">←</a>
      <div class="topbar-divider"></div>
      <span class="app-badge">FnO</span>
      <div class="topbar-divider"></div>
      <div class="topbar-titles">
        <div class="topbar-title">Equity Scenarios</div>
        <div class="topbar-sub">Stop Loss &amp; Target Tracker</div>
      </div>
    </div>
    <div class="topbar-right">
      <span class="topbar-updated" id="last-updated"></span>
      <div class="topbar-divider"></div>
      <span class="status-dot ok"></span>
    </div>
  </div>

  <!-- ── Page ───────────────────────────────────────────────────────────── -->
  <div class="page">

    <!-- Portfolio KPIs -->
    <div class="page-hdr">
      <span class="page-hdr-title">Portfolio Summary</span>
    </div>
    <div class="kpi-strip">
      <div class="kpi-tile">
        <div class="kpi-label">Total Invested</div>
        <div class="kpi-val" id="kpi-invested">—</div>
      </div>
      <div class="kpi-tile">
        <div class="kpi-label">Current Value</div>
        <div class="kpi-val" id="kpi-value">—</div>
      </div>
      <div class="kpi-tile">
        <div class="kpi-label">Total P&amp;L</div>
        <div class="kpi-val" id="kpi-pnl">—</div>
        <div class="kpi-sub" id="kpi-pnl-pct">—</div>
      </div>
      <div class="kpi-tile">
        <div class="kpi-label">Alert Status</div>
        <div class="kpi-val" id="kpi-status">—</div>
        <div class="kpi-sub" id="kpi-status-sub">—</div>
      </div>
    </div>

    <!-- Alert strip -->
    <div class="alert-strip" id="alert-strip">
      <span style="color:var(--t4);font-size:12px">Loading…</span>
    </div>

    <!-- Active positions -->
    <div class="page-hdr">
      <span class="page-hdr-title">Active Positions</span>
      <span class="page-hdr-sub">sorted by urgency · lowest buffer first</span>
    </div>
    <div class="scenarios-grid" id="scenarios-grid">
      <div class="loading">Loading positions…</div>
    </div>

    <!-- Historical triggered alerts -->
    <div class="section-block">
      <div class="section-title">Triggered Alerts — Historical</div>
      <div class="triggered-row" id="triggered-grid"></div>
    </div>

  </div>

  <script type="module">
    import { init } from './js/scenarios/equity-scenarios.js';
    init();
  </script>
</body>
</html>
