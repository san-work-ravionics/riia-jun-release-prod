<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Onboarding</title><link rel="stylesheet" href="styles.css"></head>
<body style="margin:0;display:grid;place-items:center;min-height:100vh;background:#f0eee9">
<div class="phone">
  <div class="status-bar"><span>9:41</span><div class="icons">
    <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><rect x="0" y="6" width="2" height="4"/><rect x="3" y="4" width="2" height="6"/><rect x="6" y="2" width="2" height="8"/><rect x="9" y="0" width="2" height="10"/></svg>
    <svg width="20" height="10" viewBox="0 0 20 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="16" height="9" rx="1.5"/><rect x="2" y="2" width="11" height="6" fill="currentColor"/><rect x="17" y="3" width="2" height="4" fill="currentColor"/></svg>
  </div></div>

  <div class="body" style="padding-top:28px;display:flex;flex-direction:column;gap:22px">
    <div class="hand" style="font-size:14px;color:var(--ink-2)">welcome to</div>
    <div>
      <div class="h1" style="font-size:32px;line-height:1.05">Know what you<br><span style="border-bottom:3px solid var(--accent)">actually keep.</span></div>
      <div class="body-text" style="margin-top:12px">Plan an investment in 4 quick steps. We'll show you the real return — after inflation, tax, and costs.</div>
    </div>

    <div class="scribble">
      <div style="display:flex;gap:8px;align-items:flex-end;height:110px">
        <div style="width:18px;height:30px;background:var(--ink-4);border-radius:2px"></div>
        <div style="width:18px;height:50px;background:var(--ink-4);border-radius:2px"></div>
        <div style="width:18px;height:75px;background:var(--ink-4);border-radius:2px"></div>
        <div style="width:18px;height:95px;background:var(--ink-3);border-radius:2px"></div>
        <span class="hand" style="font-size:11px;margin-left:4px;margin-bottom:2px">= gross</span>
      </div>
      <div class="hand" style="position:absolute;bottom:12px;right:14px;color:var(--accent);font-size:13px">↓ what you keep</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="display:flex;gap:12px;align-items:baseline"><span class="hand" style="font-size:18px;color:var(--accent);min-width:18px">1.</span><span style="font-size:14px;font-weight:500">Tell us your goal</span></div>
      <div style="display:flex;gap:12px;align-items:baseline"><span class="hand" style="font-size:18px;color:var(--accent);min-width:18px">2.</span><span style="font-size:14px;font-weight:500">Tell us your timeline</span></div>
      <div style="display:flex;gap:12px;align-items:baseline"><span class="hand" style="font-size:18px;color:var(--accent);min-width:18px">3.</span><span style="font-size:14px;font-weight:500">Tell us your numbers</span></div>
      <div style="display:flex;gap:12px;align-items:baseline"><span class="hand" style="font-size:18px;color:var(--accent);min-width:18px">4.</span><span style="font-size:14px;font-weight:500">See reality</span></div>
    </div>
  </div>

  <div class="nav-bottom">
    <a class="btn" href="01-investor-a.html" style="text-decoration:none">Get started <svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M3 7h8M7 3l4 4-4 4"/></svg></a>
  </div>
  <div class="gesture-bar"></div>
</div>
<script src="app.js"></script>
</body></html>
