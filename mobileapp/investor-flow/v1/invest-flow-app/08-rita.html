<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Rita app handoff</title><link rel="stylesheet" href="styles.css"></head>
<body style="margin:0;display:grid;place-items:center;min-height:100vh;background:#f0eee9">
<div class="phone">
  <div class="status-bar"><span>9:41</span><div class="icons">
    <svg width="14" height="10" viewBox="0 0 14 10" fill="currentColor"><rect x="0" y="6" width="2" height="4"/><rect x="3" y="4" width="2" height="6"/><rect x="6" y="2" width="2" height="8"/><rect x="9" y="0" width="2" height="10"/></svg>
    <svg width="20" height="10" viewBox="0 0 20 10" fill="none" stroke="currentColor" stroke-width="1"><rect x="0.5" y="0.5" width="16" height="9" rx="1.5"/><rect x="2" y="2" width="11" height="6" fill="currentColor"/><rect x="17" y="3" width="2" height="4" fill="currentColor"/></svg>
  </div></div>

  <div class="app-bar">
    <a class="back" href="07-actions.html"><svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><path d="M9 2 4 7l5 5"/></svg></a>

  <div class="rita-frame">

      <div>

        <div class="body-text" style="margin-top:6px;max-width:240px">This is where the existing Rita app continues — portfolio setup, KYC, fund selection, deposit.</div>

      </div>
    </div>
    <div style="padding:0 16px 16px">
      <div class="sketch fill" style="padding:12px;font-size:12px;color:var(--ink-2)">
        <b>Carried over:</b> €250/mo · 12y · balanced preset · 2.5% inflation, 25% tax, 1.2% costs
      </div>
    </div>
  </div>
  <div class="gesture-bar"></div>
