# IXIC (NASDAQ Composite) — Fine-tuning defaults
# US tech-heavy index; higher beta and drawdown depth than DJI, strong trends.
# New in F34 Phase 2.5 — every instrument gets its own env config (Phase 3.6 pattern).
instrument: IXIC

training:
  timesteps: 300000
  learning_rate: 0.0001
  buffer_size: 100000
  exploration_pct: 0.50
  n_seeds: 3
  episode_length: 252       # 1 trading year; index-level

# RIIATradingEnvV2 per-instrument hyperparameters (Phase 3.6 pattern).
# USD instrument -> rf_daily = 4.5% annualised (US T-bill proxy).
# Hedge cost/floor above the NIFTY baseline — tech-index drawdowns are deeper
# and implied vol (hedge carry) runs richer than for DJI.
env:
  hedge_cost_per_day: 0.0040
  hedge_daily_floor: -0.017
  dsr_eta: 0.004
  rf_daily: 0.00017857142857142857   # 0.045 / 252
  hard_mdd_limit: -0.10
  mdd_terminal_penalty: -5.0
  risk_tolerance_mdd:
    low: -0.08
    medium: -0.15
    high: -0.25
  episode_length: 252
  feature_columns:
    - daily_return
    - rsi_14
    - macd
    - macd_signal
    - bb_pct_b
    - trend_score
    - Close
    - atr_14
    - ema_ratio

notes: >
  Strong momentum regime — RSI and ema_ratio historically reliable; 2022-style
  rate-shock drawdowns are the hedging test case. Initial config seeded in F34
  Phase 2.5; re-tune after the first 50k-timestep round.
