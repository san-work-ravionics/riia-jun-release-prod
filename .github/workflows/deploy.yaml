name: Build and Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image reference
        id: meta
        run: |
          IMAGE="ghcr.io/${{ github.repository }}/rita:${{ github.sha }}"
          echo "image=${IMAGE}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ghcr.io/${{ github.repository }}/rita:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    env:
      IMAGE: ${{ needs.build-and-push.outputs.image }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Sync instrument data to EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_IP }} \
            "sudo mkdir -p /opt/rita_input/raw /opt/rita_input/input /opt/rita_output && sudo chown -R ubuntu:ubuntu /opt/rita_input /opt/rita_output"
          rsync -av --update \
            -e "ssh -o StrictHostKeyChecking=no" \
            data/raw/ \
            ubuntu@${{ secrets.AWS_EC2_IP }}:/opt/rita_input/raw/
          rsync -av --update \
            -e "ssh -o StrictHostKeyChecking=no" \
            data/input/ \
            ubuntu@${{ secrets.AWS_EC2_IP }}:/opt/rita_input/input/

      # Split into three short SSH calls so no single session survives
      # long enough to be killed by the OOM spike during container swap.

      - name: Pull image on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_IP }} \
            "echo '${{ secrets.GHCR_PAT }}' | docker login ghcr.io -u san-work-ravionics --password-stdin \
             && docker pull '${{ env.IMAGE }}'"

      - name: Swap container on EC2
        run: |
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_IP }} \
            "docker stop rita 2>/dev/null || true; docker rm rita 2>/dev/null || true"
          ssh -o StrictHostKeyChecking=no ubuntu@${{ secrets.AWS_EC2_IP }} \
            "docker run -d \
              --name rita \
              --restart unless-stopped \
              -p 127.0.0.1:8000:8000 \
              -e RITA_ENV=production \
              -e RITA_JWT_SECRET='${{ secrets.RITA_JWT_SECRET }}' \
              -e RITA_GOOGLE_CLIENT_ID='${{ secrets.GOOGLE_CLIENT_ID }}' \
              -e RITA_GOOGLE_CLIENT_SECRET='${{ secrets.GOOGLE_CLIENT_SECRET }}' \
              -e RITA_BASE_URL='${{ secrets.RITA_BASE_URL }}' \
              -v /opt/rita_input:/app/data:ro \
              -v /opt/rita_output:/app/rita_output \
              --memory 900m \
              --log-driver awslogs \
              --log-opt awslogs-region=ap-south-1 \
              --log-opt awslogs-group=/rita/app \
              --log-opt awslogs-stream=rita-container \
              '${{ env.IMAGE }}'"

      - name: Health check
        run: |
          echo "Waiting for /health..."
          for i in $(seq 1 30); do
            if curl -sf http://${{ secrets.AWS_EC2_IP }}/health > /dev/null; then
              echo "RITA is up."
              exit 0
            fi
            sleep 6
          done
          echo "Health check timed out."
          exit 1
