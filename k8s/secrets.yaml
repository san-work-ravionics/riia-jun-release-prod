apiVersion: v1
kind: Secret
metadata:
  name: rita-secrets
  namespace: default
type: Opaque
stringData:
  # Values injected at deploy time by envsubst — set these in GitHub Secrets.
  # Never commit real values here.
  RITA_JWT_SECRET: "${RITA_JWT_SECRET}"
  RITA_GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
  RITA_GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
